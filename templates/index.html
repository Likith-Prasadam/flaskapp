<!doctype html>
<html>
  <head>
    <title>Flask Notes App</title>
    <link rel="stylesheet" href="static/style.css" />
  </head>
  <body>
    <h1>Notes App</h1>

    <form action="/add" method="POST">
      <input type="text" name="note" placeholder="Enter Note" />
      <button type="submit">Add Note</button>
    </form>

    <ul>
      {% for note in notes %}
      <li>{{ note }}</li>
      {% endfor %}
    </ul>
  </body>
</html>
